version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chinese_learning_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chinese_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chinese_pass}
      POSTGRES_DB: ${POSTGRES_DB:-chinese_learning}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chinese_learning_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chinese_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: chinese_learning_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chinese_admin}:${POSTGRES_PASSWORD:-chinese_pass}@postgres:5432/${POSTGRES_DB:-chinese_learning}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - /app/node_modules
    networks:
      - chinese_learning_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: chinese_learning_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - chinese_learning_network

volumes:
  postgres_data:
    driver: local

networks:
  chinese_learning_network:
    driver: bridge
